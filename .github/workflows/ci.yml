name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            pkg-config \
            gettext \
            curl \
            libcurl4-openssl-dev \
            libssl-dev \
            libarchive-dev \
            libpipewire-0.3-dev \
            libsystemd-dev \
            libfcitx5core-dev \
            libfcitx5config-dev \
            libfcitx5utils-dev \
            fcitx5-modules-dev \
            nlohmann-json3-dev \
            qtbase5-dev \
            qttools5-dev

      - name: Build sherpa-onnx from source
        run: sudo bash scripts/build-sherpa-onnx.sh && sudo ldconfig

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build

  flatpak:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:kde-6.10
      options: --privileged
    steps:
      - uses: actions/checkout@v4
      - name: Generate CI manifest
        run: |
          sed 's|- type: git$|  - type: dir|;s|.*url:.*xifan2333.*|        path: .|;/.*tag:.*<release-tag>/d' \
            packaging/flatpak/org.fcitx.Fcitx5.Addon.Vinput.yaml \
            > packaging/flatpak/ci-manifest.yaml
      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          manifest-path: packaging/flatpak/ci-manifest.yaml
          build-bundle: false
          repository-name: flathub
          cache-key: flatpak-builder-${{ github.sha }}
