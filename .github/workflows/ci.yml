name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-ubuntu:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: ./scripts/ci-install-build-deps.sh ubuntu24.04

      - name: Install sherpa-onnx build runtime
        shell: bash
        run: |
          prefix="${RUNNER_TEMP}/sherpa-onnx-install"
          source scripts/sherpa-onnx-vars.sh
          bash scripts/build-sherpa-onnx.sh "${SHERPA_ONNX_VERSION}" "${prefix}"
          echo "VINPUT_CMAKE_PREFIX_PATH=${prefix}" >> "${GITHUB_ENV}"

      - name: Check i18n
        run: python3 scripts/check-i18n.py

      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="${VINPUT_CMAKE_PREFIX_PATH}"

      - name: Build
        run: cmake --build build

  build-containers:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: debian-12
            image: debian:12
            target: debian12
          - name: fedora-43
            image: fedora:43
            target: fedora43
          - name: archlinux
            image: archlinux:base-devel
            target: archlinux
    runs-on: ubuntu-latest
    container:
      image: ${{ matrix.image }}
    name: ${{ matrix.name }}
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: ./scripts/ci-install-build-deps.sh "${{ matrix.target }}"

      - name: Install sherpa-onnx build runtime
        shell: bash
        run: |
          prefix="${GITHUB_WORKSPACE}/.deps/sherpa-onnx-install"
          source scripts/sherpa-onnx-vars.sh
          bash scripts/build-sherpa-onnx.sh "${SHERPA_ONNX_VERSION}" "${prefix}"
          echo "VINPUT_CMAKE_PREFIX_PATH=${prefix}" >> "${GITHUB_ENV}"

      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="${VINPUT_CMAKE_PREFIX_PATH}"

      - name: Build
        run: cmake --build build

  flatpak:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:kde-6.10
      options: --privileged
    steps:
      - uses: actions/checkout@v4
      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          manifest-path: packaging/flatpak/ci-manifest.yaml
          build-bundle: false
          repository-name: flathub
          cache-key: flatpak-builder-${{ github.sha }}
