name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            pkg-config \
            gettext \
            curl \
            libcurl4-openssl-dev \
            libssl-dev \
            libarchive-dev \
            libpipewire-0.3-dev \
            libsystemd-dev \
            libfcitx5core-dev \
            libfcitx5config-dev \
            libfcitx5utils-dev \
            fcitx5-modules-dev \
            nlohmann-json3-dev \
            qtbase5-dev \
            qttools5-dev

      - name: Build sherpa-onnx from source
        run: sudo bash scripts/build-sherpa-onnx.sh && sudo ldconfig

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build
