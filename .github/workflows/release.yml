name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  SCCACHE_DIR: ${{ github.workspace }}/.sccache
  SCCACHE_CACHE_SIZE: 2G

jobs:
  source_archive:
    runs-on: ubuntu-latest
    outputs:
      package_version: ${{ steps.meta.outputs.package_version }}
      package_release: ${{ steps.meta.outputs.package_release }}
      source_archive: ${{ steps.meta.outputs.source_archive }}
    steps:
      - uses: actions/checkout@v6

      - id: meta
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          if [[ -z "${version}" || "${version}" == "${tag}" ]]; then
            echo "Release tags must start with v" >&2
            exit 1
          fi

          echo "package_version=${version}" >> "${GITHUB_OUTPUT}"
          echo "package_release=1" >> "${GITHUB_OUTPUT}"
          echo "source_archive=fcitx5-vinput-${version}.tar.gz" >> "${GITHUB_OUTPUT}"

      - name: Verify VERSION matches release tag
        shell: bash
        run: |
          version="${{ steps.meta.outputs.package_version }}"
          version_file="$(tr -d '\n' < VERSION)"
          if [[ "${version_file}" != "${version}" ]]; then
            echo "VERSION file is ${version_file}, but release tag is ${version}" >&2
            exit 1
          fi

      - name: Create source archive
        shell: bash
        run: |
          mkdir -p dist
          ./scripts/create-source-archive.sh \
            "dist/${{ steps.meta.outputs.source_archive }}" \
            "${{ steps.meta.outputs.package_version }}" \
            "${GITHUB_WORKSPACE}"

      - uses: actions/upload-artifact@v6
        with:
          name: source-archive
          path: dist/${{ steps.meta.outputs.source_archive }}
          if-no-files-found: error

  build-linux-tarball:
    needs: source_archive
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install build dependencies
        run: ./scripts/ci-install-build-deps.sh ubuntu24.04

      - uses: actions/download-artifact@v8
        with:
          name: source-archive
          path: dist

      - name: Install sherpa-onnx build runtime
        run: |
          prefix="${RUNNER_TEMP}/sherpa-onnx-install"
          tar -xf "dist/${{ needs.source_archive.outputs.source_archive }}"
          source "fcitx5-vinput-${{ needs.source_archive.outputs.package_version }}/scripts/sherpa-onnx-vars.sh"
          bash "fcitx5-vinput-${{ needs.source_archive.outputs.package_version }}/scripts/build-sherpa-onnx.sh" \
            "${SHERPA_ONNX_VERSION}" "${prefix}"
          echo "VINPUT_CMAKE_PREFIX_PATH=${prefix}" >> "${GITHUB_ENV}"

      - uses: actions/cache@v4
        with:
          path: ${{ env.SCCACHE_DIR }}
          key: sccache-release-tarball-${{ github.ref_name }}
          restore-keys: |
            sccache-release-tarball-

      - name: Configure
        run: |
          cd "fcitx5-vinput-${{ needs.source_archive.outputs.package_version }}"
          cmake --preset ci-clang-mold \
            -DVINPUT_PROJECT_VERSION="${{ needs.source_archive.outputs.package_version }}" \
            -DVINPUT_PACKAGE_RELEASE="${{ needs.source_archive.outputs.package_release }}" \
            -DVINPUT_PACKAGE_HOMEPAGE_URL="${{ github.server_url }}/${{ github.repository }}" \
            -DVINPUT_RUNTIME_MODE=bundled

      - name: Build
        run: |
          cd "fcitx5-vinput-${{ needs.source_archive.outputs.package_version }}"
          cmake --build --preset ci-clang-mold

      - name: Package tarball
        shell: bash
        run: |
          version="${{ needs.source_archive.outputs.package_version }}"
          release="${{ needs.source_archive.outputs.package_release }}"
          mode="bundled"
          stage_root="${RUNNER_TEMP}/stage"
          archive_root="fcitx5-vinput_${version}-${release}_linux_x86_64_${mode}"
          build_root="${GITHUB_WORKSPACE}/fcitx5-vinput-${version}/build"

          rm -rf "${stage_root}" dist/release
          mkdir -p "${stage_root}" dist/release
          DESTDIR="${stage_root}" cmake --install "${build_root}"
          mv "${stage_root}/usr" "dist/release/${archive_root}"
          tar -C dist/release -czf "dist/${archive_root}.tar.gz" "${archive_root}"

      - uses: actions/upload-artifact@v6
        with:
          name: release-tarball-bundled
          path: dist/fcitx5-vinput_*_linux_x86_64_bundled.tar.gz
          if-no-files-found: error

  build-deb-ubuntu:
    needs: source_archive
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install build dependencies
        run: ./scripts/ci-install-build-deps.sh ubuntu24.04

      - uses: actions/download-artifact@v8
        with:
          name: source-archive
          path: dist

      - name: Install pre-built sherpa-onnx
        run: |
          tar -xf "dist/${{ needs.source_archive.outputs.source_archive }}"
          sudo bash "fcitx5-vinput-${{ needs.source_archive.outputs.package_version }}/scripts/build-sherpa-onnx.sh"
          sudo ldconfig

      - uses: actions/cache@v4
        with:
          path: ${{ env.SCCACHE_DIR }}
          key: sccache-release-deb-ubuntu24.04-${{ github.ref_name }}
          restore-keys: |
            sccache-release-deb-ubuntu24.04-

      - name: Build Debian package
        shell: bash
        run: |
          cd "fcitx5-vinput-${{ needs.source_archive.outputs.package_version }}"
          cmake --preset ci-clang-mold \
            -DVINPUT_PROJECT_VERSION="${{ needs.source_archive.outputs.package_version }}" \
            -DVINPUT_PACKAGE_RELEASE="${{ needs.source_archive.outputs.package_release }}" \
            -DVINPUT_PACKAGE_CONTACT="${{ github.repository_owner }} <noreply@github.com>" \
            -DVINPUT_PACKAGE_HOMEPAGE_URL="${{ github.server_url }}/${{ github.repository }}"

          cmake --build --preset ci-clang-mold
          cpack --config build/CPackConfig.cmake -G DEB -B "${GITHUB_WORKSPACE}/dist"

      - uses: actions/upload-artifact@v6
        with:
          name: release-deb-ubuntu24.04
          path: dist/*.deb
          if-no-files-found: error

  build-deb-debian12:
    needs: source_archive
    runs-on: ubuntu-latest
    container:
      image: debian:12
    steps:
      - uses: actions/checkout@v6

      - name: Install build dependencies
        run: ./scripts/ci-install-build-deps.sh debian12

      - uses: actions/download-artifact@v8
        with:
          name: source-archive
          path: dist

      - name: Install pre-built sherpa-onnx
        run: |
          tar -xf "dist/${{ needs.source_archive.outputs.source_archive }}"
          bash "fcitx5-vinput-${{ needs.source_archive.outputs.package_version }}/scripts/build-sherpa-onnx.sh"
          ldconfig

      - uses: actions/cache@v4
        with:
          path: ${{ env.SCCACHE_DIR }}
          key: sccache-release-debian12-${{ github.ref_name }}
          restore-keys: |
            sccache-release-debian12-

      - name: Build Debian package
        shell: bash
        run: |
          cd "fcitx5-vinput-${{ needs.source_archive.outputs.package_version }}"
          cmake --preset ci-clang-mold \
            -DVINPUT_PROJECT_VERSION="${{ needs.source_archive.outputs.package_version }}" \
            -DVINPUT_PACKAGE_RELEASE="${{ needs.source_archive.outputs.package_release }}" \
            -DVINPUT_PACKAGE_CONTACT="${{ github.repository_owner }} <noreply@github.com>" \
            -DVINPUT_PACKAGE_HOMEPAGE_URL="${{ github.server_url }}/${{ github.repository }}"

          cmake --build --preset ci-clang-mold
          cpack --config build/CPackConfig.cmake -G DEB -B "${GITHUB_WORKSPACE}/dist"

      - uses: actions/upload-artifact@v6
        with:
          name: release-deb-debian12
          path: dist/*.deb
          if-no-files-found: error

  build-rpm-fedora:
    needs: source_archive
    runs-on: ubuntu-latest
    container:
      image: fedora:43
    steps:
      - uses: actions/checkout@v6

      - name: Install build dependencies
        run: |
          ./scripts/ci-install-build-deps.sh fedora43
          dnf install -y rpm-build

      - uses: actions/download-artifact@v8
        with:
          name: source-archive
          path: dist

      - name: Build RPM package
        shell: bash
        run: |
          version="${{ needs.source_archive.outputs.package_version }}"
          source ./scripts/sherpa-onnx-vars.sh
          mkdir -p "${HOME}/rpmbuild/"{BUILD,BUILDROOT,RPMS,SOURCES,SPECS,SRPMS}
          cp "dist/${{ needs.source_archive.outputs.source_archive }}" "${HOME}/rpmbuild/SOURCES/"
          curl -fL --retry 3 --retry-delay 2 \
            -o "${HOME}/rpmbuild/SOURCES/${SHERPA_ONNX_ARCHIVE}" \
            "${SHERPA_ONNX_URL}"

          sed \
            -e "s/@VINPUT_VERSION@/${version}/g" \
            -e "s/@SHERPA_ONNX_VERSION@/${SHERPA_ONNX_VERSION}/g" \
            packaging/fedora/fcitx5-vinput.spec \
            > "${HOME}/rpmbuild/SPECS/fcitx5-vinput.spec"

          rpmbuild -bb "${HOME}/rpmbuild/SPECS/fcitx5-vinput.spec" \
            --define "_topdir $HOME/rpmbuild"

          mkdir -p dist
          find "${HOME}/rpmbuild/RPMS" -name '*.rpm' -exec cp {} dist/ \;

      - uses: actions/upload-artifact@v6
        with:
          name: release-rpm-fedora43
          path: dist/*.rpm
          if-no-files-found: error

  build-arch:
    needs: source_archive
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
    steps:
      - uses: actions/checkout@v6

      - name: Install build dependencies
        run: ./scripts/ci-install-build-deps.sh archlinux

      - uses: actions/download-artifact@v8
        with:
          name: source-archive
          path: dist

      - name: Render PKGBUILD
        shell: bash
        run: |
          cp "dist/${{ needs.source_archive.outputs.source_archive }}" packaging/arch/
          VINPUT_PKGURL="${{ github.server_url }}/${{ github.repository }}" \
            ./scripts/render-arch-pkgbuild.sh \
            packaging/arch/PKGBUILD.in \
            packaging/arch/PKGBUILD \
            "${{ needs.source_archive.outputs.package_version }}" \
            "packaging/arch/${{ needs.source_archive.outputs.source_archive }}" \
            "${{ needs.source_archive.outputs.package_release }}"

      - name: Build Arch package
        shell: bash
        run: |
          useradd -m builder
          chown -R builder:builder "${GITHUB_WORKSPACE}"
          su builder -c "cd '${GITHUB_WORKSPACE}/packaging/arch' && makepkg --noconfirm --cleanbuild --force"

      - uses: actions/upload-artifact@v6
        with:
          name: release-arch
          path: packaging/arch/*.pkg.tar.zst
          if-no-files-found: error

  build-flatpak:
    needs: source_archive
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:kde-6.10
      options: --privileged
    steps:
      - uses: actions/checkout@v6
      - name: Render pinned Flatpak manifest
        shell: bash
        run: |
          cp packaging/flatpak/org.fcitx.Fcitx5.Addon.Vinput.yaml \
            packaging/flatpak/release-manifest.yaml
          sed -i \
            -e "s|@FCITX5_RUNTIME_VERSION@|stable|g" \
            -e "s|@VINPUT_RELEASE_TAG@|${GITHUB_REF_NAME}|g" \
            -e "s|@VINPUT_RELEASE_COMMIT@|${GITHUB_SHA}|g" \
            packaging/flatpak/release-manifest.yaml
      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          manifest-path: packaging/flatpak/release-manifest.yaml
          bundle: fcitx5-vinput.flatpak
          repository-name: flathub
          cache-key: flatpak-builder-${{ github.sha }}
      - uses: actions/upload-artifact@v6
        with:
          name: flatpak-bundle
          path: fcitx5-vinput.flatpak

  publish-release:
    needs:
      - source_archive
      - build-linux-tarball
      - build-deb-ubuntu
      - build-deb-debian12
      - build-rpm-fedora
      - build-arch
      - build-flatpak
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        id: changelog
        with:
          args: --latest --strip header

      - uses: actions/download-artifact@v8
        with:
          path: release-artifacts

      - name: Publish assets to GitHub Release
        shell: bash
        run: |
          mkdir -p release
          find release-artifacts -type f -exec cp {} release/ \;

          if ! gh release view "${GITHUB_REF_NAME}" --repo "${GH_REPO}" >/dev/null 2>&1; then
            gh release create "${GITHUB_REF_NAME}" --repo "${GH_REPO}" \
              --notes "${{ steps.changelog.outputs.content }}"
          fi

          gh release upload "${GITHUB_REF_NAME}" --repo "${GH_REPO}" release/* --clobber
